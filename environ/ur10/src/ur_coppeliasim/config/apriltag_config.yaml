/**:
    ros__parameters:
        image_transport: raw    # image format
        family: 36h11           # tag family name (36h11 = plus robuste que 16h5)
        size: 0.10              # taille réelle du tag en mètres (VÉRIFIER!)
        max_hamming: 0          # ✅ 0 = pas d'erreur tolérée (précision max)
        approximate_sync: false # ✅ false = sync exacte image/camera_info (plus précis)

        # see "apriltag.h" 'struct apriltag_detector' for more documentation on these optional parameters
        detector:
            threads: 2          # nombre de threads (augmenté pour meilleures perfs)
            decimate: 1.0       # ✅ CRITIQUE: 1.0 = pleine résolution (pas de sous-échantillonnage)
            blur: 0.0           # pas de blur (garde netteté)
            refine: true        # ✅ snap to strong gradients (améliore précision)
            sharpening: 0.25    # sharpening des images décodées
            debug: false        # mettre true pour déboguer (sauvegarde images dans /tmp)


        # ✅ Utiliser PnP pour estimation de pose (plus précis que homography)
        pose_estimation_method: "pnp"
            
        # optional list of tags
        tag:
            ids: [0, 1]            # tag ID
            frames: [Tag0, Tag1]  # optional frame name
            sizes: [0.10, 0.10]   # ✅ VÉRIFIER que c'est la taille RÉELLE dans Isaac (10cm)
